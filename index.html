<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GBG Sprite Sheet Maker 精灵图实验室</title>
    <link rel="icon" href="others/icon.png" type="image/png">
    
    <meta name="theme-color" content="#f3f4f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- 引入资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { 
            background-color: #f3f4f6; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; 
            -webkit-touch-callout: none;
            user-select: none;
        }
        
        .checkered-bg {
            background-image: 
                linear-gradient(45deg, #e5e7eb 25%, transparent 25%), 
                linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e5e7eb 75%), 
                linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #f9fafb; 
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.99); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes fastBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .animate-fast-blink { animation: fastBlink 0.5s ease-in-out infinite; }

        /* 提醒抖动动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        /* 圆滑滑块设计 */
        .custom-slider {
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            border-radius: 9999px;
            outline: none;
            background: #e5e7eb;
        }
        .custom-slider::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: transparent; border: none; border-radius: 9999px;
        }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
            background: #111827; cursor: pointer; border: none; margin-top: -5px; transition: transform 0.1s;
        }
        .custom-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

        @keyframes coffee-pulse {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .btn-coffee-lab {
            position: relative; overflow: hidden; z-index: 1; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-coffee-lab::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(-45deg, #1677ff, #07c160, #1677ff, #07c160);
            background-size: 400% 400%; opacity: 0; z-index: -1; transition: opacity 0.6s ease;
        }
        .btn-coffee-lab:hover::before { opacity: 1; animation: coffee-pulse 8s ease infinite; }
        .btn-coffee-lab:hover { transform: scale(1.05); color: white !important; }

        .picker-cursor { cursor: crosshair !important; }

        .btn-status-icon {
            display: flex; align-items: center; justify-content: center;
            padding: 8px; border-radius: 12px; transition: all 0.2s; color: #94a3b8;
        }
        .btn-status-icon:hover { background-color: #f1f5f9; color: #1e293b; }
        .btn-status-icon.active { background-color: #1e293b; color: #ffffff; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const Icons = {
            Upload: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Video: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>,
            Download: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Trash: ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            ChevronUp: ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"/></svg>,
            ChevronDown: ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
            Pipette: ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m2 22 1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8a2.1 2.1 0 1 1 3-3l.4.4Z"/></svg>,
            Clear: ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>,
            Coffee: ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="13" y1="1" x2="13" y2="4"/></svg>,
            Close: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Play: ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
            Pause: ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>,
            Mirror: ({ size = 20 }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M10 20L3 12L10 4V20Z" />
                    <path d="M14 20L21 12L14 4V20Z" />
                </svg>
            )
        };

        const DefaultAvatar = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23111827'/%3E%3Ccircle cx='50' cy='40' r='20' fill='%23f3f4f6'/%3E%3Cpath d='M20 90 Q50 60 80 90' stroke='%23f3f4f6' stroke-width='10' fill='none'/%3E%3C/svg%3E";

        function App() {
            const [images, setImages] = useState([]);
            const [settings, setSettings] = useState({ columns: 0, padding: 0, fps: 12, tolerance: 10, saturation: 100, hue: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [currentFrame, setCurrentFrame] = useState(0);
            const [canvasSize, setCanvasSize] = useState({ width: 0, height: 0 });
            
            const [previewMode, setPreviewMode] = useState('anim'); 
            const [transparentColor, setTransparentColor] = useState(null);
            const [isPickingColor, setIsPickingColor] = useState(false);
            
            // UI Rules Menu State & Hidden Trigger
            const [showUIMenu, setShowUIMenu] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);
            const avatarClickCount = useRef(0);
            const avatarClickTimer = useRef(null);
            
            const [showDonationModal, setShowDonationModal] = useState(false);
            const [isPlaying, setIsPlaying] = useState(true);
            const [isMirrored, setIsMirrored] = useState(false);
            const [shouldShakePickBtn, setShouldShakePickBtn] = useState(false);

            const [videoFile, setVideoFile] = useState(null);
            const [videoDurationSetting, setVideoDurationSetting] = useState(5); 
            const [isExtracting, setIsExtracting] = useState(false);

            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);
            const videoInputRef = useRef(null);
            const uiRuleInputRef = useRef(null);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    if (e.code === 'Space') {
                        e.preventDefault();
                        setIsPlaying(prev => !prev);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            // 隐藏彩蛋：0.6秒内连续点击三次头像触发开发者菜单
            const handleAvatarClick = () => {
                avatarClickCount.current += 1;
                if (avatarClickCount.current === 3) {
                    setShowUIMenu(prev => !prev);
                    avatarClickCount.current = 0;
                    clearTimeout(avatarClickTimer.current);
                } else {
                    clearTimeout(avatarClickTimer.current);
                    avatarClickTimer.current = setTimeout(() => {
                        avatarClickCount.current = 0;
                    }, 600);
                }
            };

            // 导出史诗级详尽的全局 UI 规范 JSON (The Genesis Code)
            const handleDownloadUIRules = () => {
                const uiRules = {
                    name: "GBG-UI-Universal-Rules-Genesis",
                    version: "8.0",
                    description: "【最高优先级】GBG 宇宙全局架构与代码实现标准。指导所有前端/AI完全一比一克隆该软件的视觉UI、文案超链接、甚至底层隐藏交互的 React 逻辑。不可遗漏任何细节。",
                    developerMenuImplementation: {
                        warning: "【极度重要】任何生成此软件的 AI，必须在代码中完整植入以下的 React 逻辑与 DOM 结构，确保开发者菜单真实可用，而不是仅仅画一个死按钮。",
                        requiredReactHooks: [
                            "const [showUIMenu, setShowUIMenu] = useState(false);",
                            "const avatarClickCount = useRef(0);",
                            "const avatarClickTimer = useRef(null);",
                            "const uiRuleInputRef = useRef(null);"
                        ],
                        requiredFunctions: {
                            handleAvatarClick: "const handleAvatarClick = () => { avatarClickCount.current += 1; if (avatarClickCount.current === 3) { setShowUIMenu(prev => !prev); avatarClickCount.current = 0; clearTimeout(avatarClickTimer.current); } else { clearTimeout(avatarClickTimer.current); avatarClickTimer.current = setTimeout(() => { avatarClickCount.current = 0; }, 600); } };",
                            handleUploadUIRules: "必须为 uiRuleInputRef 绑定 onChange 事件，使用 FileReader 解析 JSON 文件。",
                            handleDownloadUIRules: "必须实现生成 Blob，然后 URL.createObjectURL，挂载到临时 <a> 标签触发下载的逻辑。"
                        },
                        requiredDOM: {
                            hiddenFileInput: "<input type='file' ref={uiRuleInputRef} onChange={handleUploadUIRules} accept='.json' className='hidden' />",
                            avatarTrigger: "<img onClick={handleAvatarClick} ... />",
                            menuDropdown: "在头像的父容器使用 relative，菜单本身使用 absolute top-[52px] left-0，且背景需带有一层 fixed inset-0 z-40 的透明蒙版用于点击外部关闭。"
                        }
                    },
                    layoutArchitecture: {
                        window: "100dvh, flex-col, overflow-hidden, 背景色 bg-gray-100",
                        grid: "顶部 Header 栏 + 底部 Main 三段式 (Left Sidebar: 320px, Center Canvas: flex-1, Right Sidebar: 320px)。区域间 gap 为 16px (gap-4)。完全零滚轮 (Zero-scrollbar)。"
                    },
                    standardizedComponents: {
                        header: {
                            layout: "全宽大圆角胶囊形态",
                            style: "bg-white py-3 px-6 rounded-full flex items-center justify-between border border-gray-100 shadow-sm shrink-0",
                            leftSection: {
                                avatar: "src: 'others/xieyoujune.jpg', fallback: DefaultAvatar, size: w-11 h-11 (44x44px), object-fit: cover, rounded-full, 带有 hover:scale-105 transition-transform 动画。",
                                userInfo: {
                                    name: "@谢有君 (text-xl, font-black, leading-none, text-gray-900)",
                                    links: [
                                        { text: "独立音乐人", url: "https://music.163.com/#/artist?id=1184020" },
                                        { text: "《人生之旅》游戏开发者", url: "https://www.xiaohongshu.com/user/profile/63cac1130000000026006f9a" }
                                    ],
                                    linksStyle: "text-[10px], font-bold, uppercase, tracking-widest, text-gray-400, hover:text-gray-600。包含 target='_blank' rel='noopener noreferrer' 属性。"
                                },
                                divider: "w-px h-8 bg-gray-200 mx-2"
                            },
                            rightSection_Buttons: {
                                structure: "三大核心操作按键，纯圆角胶囊形态 (rounded-full)",
                                uploadBtn: { text: "上传", style: "px-6 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-800 text-sm font-black uppercase tracking-widest rounded-full transition-all" },
                                exportBtn: { text: "导出", style: "px-6 py-2.5 bg-[#b0b3b8] hover:bg-gray-500 text-white text-sm font-black uppercase tracking-widest rounded-full transition-all active:scale-95" },
                                coffeeBtn: {
                                    icon: "Coffee Cup (Stroke 2.5)",
                                    style: "px-4 py-2.5 bg-gray-100 text-gray-800 rounded-full btn-coffee-lab shadow-sm",
                                    hoverAnimation: "必须实现 CSS 动画: linear-gradient(-45deg, #1677ff, #07c160, #1677ff, #07c160)，背景放大400%，8秒一周期无限律动 (coffee-pulse)"
                                }
                            }
                        },
                        donationModal: {
                            trigger: "点击咖啡杯按钮时弹出",
                            backdrop: "fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm",
                            content: {
                                title: "请我喝杯咖啡 ☕️",
                                subtitle: "感谢支持独立开发",
                                qrCodes: [
                                    { platform: "微信支付", imagePath: "others/wechatpay.jpg", textColor: "#07c160" },
                                    { platform: "支付宝", imagePath: "others/alipay.jpg", textColor: "#1677ff" }
                                ]
                            }
                        },
                        sidebarsAndCards: {
                            outerContainer: "bg-white p-4 rounded-[28px] border border-gray-100 flex flex-col gap-3 shadow-sm",
                            innerCard: "bg-gray-50 p-5 rounded-[24px] or rounded-[20px] border border-gray-100",
                            sliders: "轨道 4px，滑块头 14x14px 且必须是完美的圆形 (rounded-full)",
                            typography: {
                                labels: "text-[10px]或[11px], font-black, text-gray-400, uppercase, tracking-widest",
                                values: "font-mono, font-black, text-gray-900"
                            }
                        }
                    }
                };
                const blob = new Blob([JSON.stringify(uiRules, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `GBG_UI_Genesis_Rules_${Date.now()}.json`;
                a.click();
                URL.revokeObjectURL(url);
                setShowUIMenu(false);
                
                showToast("✅ GBG 核心宇宙基因 (JSON) 已成功导出！");
            };

            const handleUploadUIRules = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const rules = JSON.parse(event.target.result);
                        if (rules.name && rules.name.includes("GBG-UI")) {
                            showToast("✅ 核心规则导入成功");
                        } else {
                            showToast("❌ 无法识别的 UI 规则文件格式");
                        }
                    } catch (err) {
                        showToast("❌ 文件解析失败");
                    }
                };
                reader.readAsText(file);
                setShowUIMenu(false);
                if (uiRuleInputRef.current) uiRuleInputRef.current.value = '';
            };

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(null), 3000);
            };

            const handleFiles = async (files) => {
                const validFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
                if (validFiles.length === 0) return;
                setVideoFile(null);
                setCurrentFrame(0);
                const newImages = await Promise.all(validFiles.map(file => {
                    return new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const img = new Image();
                            img.onload = () => resolve({
                                id: Math.random().toString(36).substr(2, 9),
                                file, url: e.target.result, img,
                                width: img.width, height: img.height, name: file.name
                            });
                            img.src = e.target.result;
                        };
                        reader.readAsDataURL(file);
                    });
                }));
                newImages.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
                setImages(newImages);
            };

            const extractFrames = async (file, dur) => {
                setIsExtracting(true);
                setCurrentFrame(0);
                return new Promise((resolve) => {
                    const video = document.createElement('video');
                    video.src = URL.createObjectURL(file);
                    video.muted = true; video.playsInline = true; video.preload = "auto";
                    video.crossOrigin = "anonymous";
                    const cleanup = () => { URL.revokeObjectURL(video.src); setIsExtracting(false); };
                    video.onerror = () => { cleanup(); resolve([]); };
                    
                    video.onloadedmetadata = async () => {
                        try {
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth || 1; 
                            canvas.height = video.videoHeight || 1;
                            const ctx = canvas.getContext('2d');
                            const frames = [];
                            const frameCount = dur === 1 ? 5 : (dur === 10 ? 48 : 24);
                            const videoDur = isNaN(video.duration) || video.duration === Infinity ? dur : video.duration;
                            const targetTime = Math.min(videoDur, dur);
                            const step = targetTime / frameCount;

                            for (let i = 0; i < frameCount; i++) {
                                video.currentTime = Math.min(i * step, videoDur);
                                await new Promise((res) => {
                                    const onS = () => { video.removeEventListener('seeked', onS); res(); };
                                    video.addEventListener('seeked', onS);
                                    setTimeout(onS, 1000); 
                                });
                                ctx.drawImage(video, 0, 0);
                                const url = canvas.toDataURL('image/png');
                                const img = new Image();
                                await new Promise(r => { img.onload = r; img.src = url; });
                                frames.push({ 
                                    id: Math.random().toString(36).substr(2, 9), 
                                    url, img, width: img.width, height: img.height, 
                                    name: `v_frame_${(i+1).toString().padStart(3,'0')}.png` 
                                });
                            }
                            cleanup(); resolve(frames);
                        } catch (err) { cleanup(); resolve([]); }
                    };
                    video.load();
                });
            };

            const handleVideo = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setVideoFile(file); setTransparentColor(null);
                const frames = await extractFrames(file, videoDurationSetting);
                if (frames && frames.length > 0) setImages(frames);
            };

            const handleDurationChange = async (val) => {
                if (isExtracting || !videoFile) return;
                setVideoDurationSetting(val);
                const frames = await extractFrames(videoFile, val);
                if (frames && frames.length > 0) setImages(frames);
            };

            const onDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
            const onDragLeave = (e) => { e.preventDefault(); setIsDragging(false); };
            const onDrop = (e) => {
                e.preventDefault(); setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    if (file.type.startsWith('video/')) {
                        setVideoFile(file); setTransparentColor(null);
                        extractFrames(file, videoDurationSetting).then(res => res && res.length && setImages(res));
                    } else handleFiles(e.dataTransfer.files);
                }
            };

            const handleCanvasClick = (e) => {
                if (!isPickingColor || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = Math.floor((e.clientX - rect.left) * scaleX);
                const y = Math.floor((e.clientY - rect.top) * scaleY);
                const ctx = canvas.getContext('2d');
                const pixel = ctx.getImageData(x, y, 1, 1).data;
                if (pixel[3] > 0) setTransparentColor({ r: pixel[0], g: pixel[1], b: pixel[2] });
                setIsPickingColor(false);
            };

            const drawCore = (ctx, w, h, isSheet) => {
                if (images.length === 0) return;
                ctx.clearRect(0, 0, w, h); ctx.save();
                
                ctx.filter = `saturate(${settings.saturation}%) hue-rotate(${settings.hue}deg)`;

                if (isMirrored) { ctx.translate(w, 0); ctx.scale(-1, 1); }
                if (isSheet) {
                    const validImages = images.filter(i => i && i.img);
                    if (validImages.length === 0) return;
                    const mw = Math.max(...validImages.map(i => i.width));
                    const mh = Math.max(...validImages.map(i => i.height));
                    let cols = settings.columns > 0 ? settings.columns : Math.ceil(Math.sqrt(validImages.length));
                    const pad = settings.padding;
                    validImages.forEach((imgObj, idx) => {
                        const col = idx % cols; const row = Math.floor(idx / cols);
                        ctx.drawImage(imgObj.img, col*(mw+pad) + (mw-imgObj.width)/2, row*(mh+pad) + (mh-imgObj.height)/2);
                    });
                } else {
                    const target = images[currentFrame] || images[0];
                    if (target && target.img) ctx.drawImage(target.img, 0, 0);
                }
                ctx.restore();

                if (transparentColor && !isPickingColor) {
                    const idata = ctx.getImageData(0, 0, w, h);
                    const d = idata.data; const {r,g,b} = transparentColor; const tol = settings.tolerance;
                    for (let i=0; i<d.length; i+=4) if (Math.abs(d[i]-r)<=tol && Math.abs(d[i+1]-g)<=tol && Math.abs(d[i+2]-b)<=tol) d[i+3]=0;
                    ctx.putImageData(idata, 0, 0);
                }
            };

            const updateCanvas = useCallback(() => {
                if (!canvasRef.current || images.length === 0) { 
                    if (canvasSize.width !== 0) setCanvasSize({ width: 0, height: 0 }); 
                    return; 
                }
                const canvas = canvasRef.current;
                const validImages = images.filter(i => i && i.img);
                if (validImages.length === 0) return;

                if (previewMode === 'sheet') {
                    const mw = Math.max(...validImages.map(i => i.width));
                    const mh = Math.max(...validImages.map(i => i.height));
                    let cols = settings.columns > 0 ? settings.columns : Math.ceil(Math.sqrt(validImages.length));
                    const rows = Math.ceil(validImages.length / cols);
                    const pad = settings.padding;
                    const w = cols * mw + (cols - 1) * pad;
                    const h = Math.ceil(validImages.length / cols) * mh + (Math.ceil(validImages.length / cols) - 1) * pad;
                    
                    if (canvas.width !== w || canvas.height !== h) {
                        canvas.width = w; canvas.height = h;
                        setCanvasSize({ width: w, height: h });
                    }
                    drawCore(canvas.getContext('2d'), w, h, true);
                } else {
                    const f = images[currentFrame] || images[0]; if (!f) return;
                    if (canvas.width !== f.width || canvas.height !== f.height) {
                        canvas.width = f.width; canvas.height = f.height;
                        setCanvasSize({ width: f.width, height: f.height });
                    }
                    drawCore(canvas.getContext('2d'), f.width, f.height, false);
                }
            }, [images, settings, transparentColor, isPickingColor, previewMode, currentFrame, isMirrored]);

            useEffect(() => { updateCanvas(); }, [updateCanvas]);

                if (images.length <= 1 || !isPlaying) return;

                const pad = settings.padding;
                const w = cols * mw + (cols - 1) * pad;
                const h = Math.ceil(validImages.length / cols) * (mh + pad);
                tmp.width = w; tmp.height = h;
                drawCore(tmp.getContext('2d'), w, h, true);
                const a = document.createElement('a'); a.download=`sprite_${Date.now()}.png`; a.href=tmp.toDataURL('image/png'); a.click();

                                                        </button>
                                                    </div>
                                                    <button onClick={()=>removeImage(img.id)} className="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 hover:bg-red-100 hover:text-red-600 rounded-[12px] transition-all ml-1 border border-red-100">
                                                        <Icons.Trash size={16} />
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </aside>
                        </main>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
